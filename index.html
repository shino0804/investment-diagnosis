<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>投資タイプ診断</title>
</head>

<body>

<h1>投資タイプ診断</h1>

<p>質問に答えるとあなたの投資タイプが分かります</p>

<button onclick="start()">診断スタート</button>

<script>

function start(){
let score = 0;

let q1 = prompt("Q1. リスクは取れる？ yes / no");
if(q1 === "yes"){score++}

let q2 = prompt("Q2. 長期投資が好き？ yes / no");
if(q2 === "yes"){score++}

let q3 = prompt("Q3. 個別株に興味ある？ yes / no");
if(q3 === "yes"){score++}

if(score <= 1){
alert("あなたは コツコツ投資タイプ");
}

else if(score == 2){
alert("あなたは バランス投資タイプ");
}

else{
alert("あなたは アクティブ投資タイプ");
}

}

</script>

</body>
</html>
